<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tetris Neon</title>
  <style>
    :root {
      --bg1: #08111f;
      --bg2: #0f1f35;
      --panel: rgba(10, 18, 31, 0.72);
      --panel-border: rgba(151, 184, 255, 0.18);
      --text: #eef4ff;
      --muted: #a8bbdf;
      --accent: #67d7ff;
      --accent-2: #9bffcb;
      --danger: #ff7d8a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(103, 215, 255, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(155, 255, 203, 0.12), transparent 25%),
        linear-gradient(160deg, var(--bg2), var(--bg1));
      font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .shell {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 22px;
      align-items: center;
    }

    .board-wrap,
    .side {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: 28px;
    }

    .board-wrap {
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .board-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(103, 215, 255, 0.08), transparent 45%, rgba(155, 255, 203, 0.06));
      pointer-events: none;
    }

    .board-wrap.is-flashing::before {
      background: linear-gradient(135deg, rgba(103, 215, 255, 0.18), transparent 40%, rgba(155, 255, 203, 0.14));
    }

    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 2vw, 2.2rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .board {
      width: 100%;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 1;
    }

    canvas {
      display: block;
      width: min(100%, 420px);
      height: auto;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(6, 12, 22, 0.9), rgba(11, 20, 33, 0.95));
      border: 1px solid rgba(169, 199, 255, 0.2);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .side {
      padding: 18px;
      display: grid;
      gap: 16px;
      align-self: stretch;
    }

    .card {
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 14px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      padding: 12px;
      border-radius: 16px;
      background: rgba(103, 215, 255, 0.08);
      border: 1px solid rgba(103, 215, 255, 0.14);
    }

    .stat span {
      display: block;
      font-size: 0.86rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat strong {
      font-size: 1.35rem;
      letter-spacing: 0.03em;
    }

    .next-box {
      display: grid;
      place-items: center;
      min-height: 150px;
    }

    #next {
      width: 100%;
      max-width: 210px;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(6, 12, 22, 0.85), rgba(12, 21, 34, 0.95));
      border: 1px solid rgba(169, 199, 255, 0.2);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--text);
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      background: linear-gradient(180deg, rgba(103, 215, 255, 0.22), rgba(103, 215, 255, 0.12));
      border: 1px solid rgba(103, 215, 255, 0.28);
      transition: transform 0.15s ease, filter 0.15s ease, background 0.15s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.05); }
    button:active { transform: translateY(1px) scale(0.99); }

    .secondary {
      background: linear-gradient(180deg, rgba(155, 255, 203, 0.18), rgba(155, 255, 203, 0.1));
      border-color: rgba(155, 255, 203, 0.22);
    }

    .danger {
      background: linear-gradient(180deg, rgba(255, 125, 138, 0.2), rgba(255, 125, 138, 0.1));
      border-color: rgba(255, 125, 138, 0.25);
    }

    .help {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    .touch {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .touch button {
      padding: 14px 10px;
      border-radius: 18px;
      user-select: none;
      touch-action: manipulation;
    }

    .touch .wide { grid-column: span 2; }

    .banner {
      position: absolute;
      inset: 20px 20px auto auto;
      z-index: 2;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(7, 14, 24, 0.68);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--accent-2);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .side {
        order: -1;
      }
    }

    @media (max-width: 560px) {
      body { padding: 12px; }
      .board-wrap, .side { border-radius: 22px; }
      .controls { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="board-wrap">
      <div class="banner">Tetris Neon</div>
      <div class="hud-top">
        <h1>Tetris Neon</h1>
        <div class="status" id="message">Usa as teclas para jogar</div>
      </div>
      <div class="board">
        <canvas id="game" width="280" height="560" aria-label="Jogo Tetris" role="img"></canvas>
      </div>
    </section>

    <aside class="side">
      <div class="card">
        <h2>Estado</h2>
        <div class="stats">
          <div class="stat"><span>Pontos</span><strong id="score">0</strong></div>
          <div class="stat"><span>Linhas</span><strong id="lines">0</strong></div>
          <div class="stat"><span>Nível</span><strong id="level">1</strong></div>
          <div class="stat"><span>Melhor</span><strong id="best">0</strong></div>
        </div>
      </div>

      <div class="card">
        <h2>Próxima peça</h2>
        <div class="next-box">
          <canvas id="next" width="180" height="180"></canvas>
        </div>
      </div>

      <div class="card">
        <h2>Controles</h2>
        <div class="controls">
          <button id="startBtn" class="secondary">Iniciar / Reiniciar</button>
          <button id="pauseBtn">Pausa</button>
        </div>
      </div>

      <div class="card">
        <h2>Teclas</h2>
        <div class="help">
          ← → mover<br>
          ↓ descer mais rápido<br>
          ↑ rodar<br>
          Espaço queda instantânea<br>
          P pausa
        </div>
      </div>

      <div class="card">
        <h2>Toque</h2>
        <div class="touch">
          <button id="leftBtn">◀</button>
          <button id="rotateBtn">⟳</button>
          <button id="rightBtn">▶</button>
          <button id="downBtn">▼</button>
          <button id="dropBtn" class="wide secondary">Cair</button>
          <button id="pauseTouchBtn" class="danger">Pausa</button>
        </div>
      </div>
    </aside>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next');
    const nextCtx = nextCanvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const linesEl = document.getElementById('lines');
    const levelEl = document.getElementById('level');
    const bestEl = document.getElementById('best');
    const messageEl = document.getElementById('message');

    const COLS = 10;
    const ROWS = 20;
    const CELL = 28;
    const COLORS = [
      null,
      '#67d7ff',
      '#ffd166',
      '#9bffcb',
      '#ff7d8a',
      '#b69cff',
      '#7ce0ff',
      '#ff9f6e'
    ];

    const SHAPES = [
      [[1,1,1,1]],
      [[2,0,0],[2,2,2]],
      [[0,0,3],[3,3,3]],
      [[4,4],[4,4]],
      [[0,5,5],[5,5,0]],
      [[0,6,0],[6,6,6]],
      [[7,7,0],[0,7,7]]
    ];

    let board = createBoard();
    let current = null;
    let nextPiece = null;
    let score = 0;
    let lines = 0;
    let level = 1;
    let best = Number(localStorage.getItem('tetris-best') || 0);
    let dropCounter = 0;
    let dropInterval = 900;
    let lastTime = 0;
    let isRunning = false;
    let isPaused = false;
    let gameOver = false;
    let shakeFrames = 0;
    let flashStrength = 0;
    let particles = [];
    let audioContext = null;

    const boardWrap = document.querySelector('.board-wrap');

    bestEl.textContent = best;

    function getAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!audioContext && AudioContextClass) {
        audioContext = new AudioContextClass();
      }
      return audioContext;
    }

    function playTone({ frequency, type = 'sine', duration = 0.09, gain = 0.05, slideTo = null }) {
      const context = getAudioContext();
      if (!context) return;
      if (context.state === 'suspended') {
        context.resume();
      }

      const now = context.currentTime;
      const oscillator = context.createOscillator();
      const amplifier = context.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, now);
      if (slideTo !== null) {
        oscillator.frequency.exponentialRampToValueAtTime(slideTo, now + duration);
      }

      amplifier.gain.setValueAtTime(0.0001, now);
      amplifier.gain.exponentialRampToValueAtTime(gain, now + 0.01);
      amplifier.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      oscillator.connect(amplifier);
      amplifier.connect(context.destination);
      oscillator.start(now);
      oscillator.stop(now + duration + 0.03);
    }

    function soundMove() {
      playTone({ frequency: 300, type: 'square', duration: 0.05, gain: 0.03, slideTo: 260 });
    }

    function soundRotate() {
      playTone({ frequency: 520, type: 'triangle', duration: 0.07, gain: 0.04, slideTo: 760 });
    }

    function soundSoftDrop() {
      playTone({ frequency: 220, type: 'sine', duration: 0.05, gain: 0.025, slideTo: 180 });
    }

    function soundLock() {
      playTone({ frequency: 180, type: 'square', duration: 0.09, gain: 0.05, slideTo: 120 });
    }

    function soundLineClear(linesRemoved) {
      playTone({ frequency: 620, type: 'triangle', duration: 0.12, gain: 0.06, slideTo: 920 });
      if (linesRemoved > 1) {
        setTimeout(() => playTone({ frequency: 740, type: 'triangle', duration: 0.1, gain: 0.05, slideTo: 1040 }), 70);
      }
    }

    function soundGameOver() {
      playTone({ frequency: 160, type: 'sawtooth', duration: 0.22, gain: 0.06, slideTo: 70 });
    }

    function triggerFlash(amount = 1) {
      flashStrength = Math.min(1, flashStrength + amount);
      boardWrap.classList.add('is-flashing');
      window.clearTimeout(triggerFlash.timer);
      triggerFlash.timer = window.setTimeout(() => {
        boardWrap.classList.remove('is-flashing');
      }, 90);
    }

    function emitParticles(row, color, amount = 18) {
      for (let i = 0; i < amount; i++) {
        const x = (Math.random() * COLS + 0.2) * CELL;
        const y = row * CELL + CELL / 2;
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 3.8,
          vy: -Math.random() * 3.6 - 0.8,
          life: 26 + Math.random() * 18,
          color,
          size: 2 + Math.random() * 3
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(particle => {
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vy += 0.12;
        particle.life -= 1;
        return particle.life > 0;
      });
      shakeFrames = Math.max(0, shakeFrames - 1);
      flashStrength = Math.max(0, flashStrength - 0.05);
    }

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function cloneMatrix(matrix) {
      return matrix.map(row => row.slice());
    }

    function createPiece() {
      const shapeIndex = Math.floor(Math.random() * SHAPES.length);
      const matrix = cloneMatrix(SHAPES[shapeIndex]);
      return {
        matrix,
        color: shapeIndex + 1,
        x: Math.floor((COLS - matrix[0].length) / 2),
        y: 0
      };
    }

    function resetGame() {
      board = createBoard();
      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 900;
      gameOver = false;
      isPaused = false;
      current = createPiece();
      nextPiece = createPiece();
      shakeFrames = 0;
      flashStrength = 0;
      particles = [];
      if (collides(current, board)) {
        gameOver = true;
      }
      updateHud();
      messageEl.textContent = 'Boa sorte';
      isRunning = true;
      lastTime = 0;
      drawNext();
      draw();
    }

    function collides(piece, testBoard) {
      const { matrix, x, y } = piece;
      for (let row = 0; row < matrix.length; row++) {
        for (let col = 0; col < matrix[row].length; col++) {
          if (!matrix[row][col]) continue;
          const boardY = y + row;
          const boardX = x + col;
          if (boardX < 0 || boardX >= COLS || boardY >= ROWS) return true;
          if (boardY >= 0 && testBoard[boardY][boardX]) return true;
        }
      }
      return false;
    }

    function mergePiece() {
      current.matrix.forEach((row, rowIndex) => {
        row.forEach((value, colIndex) => {
          if (value) {
            board[current.y + rowIndex][current.x + colIndex] = current.color;
          }
        });
      });
    }

    function clearLines() {
      let removed = 0;
      const clearedRows = [];
      for (let row = ROWS - 1; row >= 0; row--) {
        if (board[row].every(cell => cell !== 0)) {
          board.splice(row, 1);
          board.unshift(Array(COLS).fill(0));
          removed++;
          clearedRows.push(row);
          row++;
        }
      }

      if (removed > 0) {
        lines += removed;
        const lineScores = [0, 100, 300, 500, 800];
        score += lineScores[removed] * level;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(120, 900 - (level - 1) * 70);
        shakeFrames = Math.max(shakeFrames, 10 + removed * 4);
        triggerFlash(0.8);
        soundLineClear(removed);
        clearedRows.forEach(row => emitParticles(row, COLORS[(row % 7) + 1], 16 + removed * 3));
      }
    }

    function spawnPiece() {
      current = nextPiece;
      current.x = Math.floor((COLS - current.matrix[0].length) / 2);
      current.y = 0;
      nextPiece = createPiece();
      drawNext();
      if (collides(current, board)) {
        gameOver = true;
        isRunning = false;
        messageEl.textContent = 'Fim de jogo. Carrega em Reiniciar';
        soundGameOver();
        triggerFlash(0.45);
        shakeFrames = 18;
        if (score > best) {
          best = score;
          localStorage.setItem('tetris-best', String(best));
          bestEl.textContent = best;
        }
      }
    }

    function rotateMatrix(matrix) {
      const rows = matrix.length;
      const cols = matrix[0].length;
      const rotated = Array.from({ length: cols }, () => Array(rows).fill(0));
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          rotated[c][rows - 1 - r] = matrix[r][c];
        }
      }
      return rotated;
    }

    function rotateCurrent() {
      if (!current || gameOver || isPaused) return;
      const original = current.matrix;
      const rotated = rotateMatrix(current.matrix);
      current.matrix = rotated;
      let offset = 0;
      while (collides(current, board)) {
        current.x += offset > 0 ? -offset : 1;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > current.matrix[0].length) {
          current.matrix = original;
          current.x = Math.floor((COLS - original[0].length) / 2);
          return;
        }
      }
      soundRotate();
    }

    function move(dir) {
      if (!current || gameOver || isPaused) return;
      current.x += dir;
      if (collides(current, board)) current.x -= dir;
      else soundMove();
    }

    function softDrop() {
      if (!current || gameOver || isPaused) return;
      current.y++;
      if (collides(current, board)) {
        current.y--;
        lockPiece();
      } else {
        score += 1;
        updateHud();
        soundSoftDrop();
      }
      dropCounter = 0;
    }

    function hardDrop() {
      if (!current || gameOver || isPaused) return;
      let distance = 0;
      while (!collides(current, board)) {
        current.y++;
        distance++;
      }
      current.y--;
      score += Math.max(0, distance - 1) * 2;
      soundSoftDrop();
      lockPiece();
      updateHud();
      dropCounter = 0;
    }

    function lockPiece() {
      soundLock();
      mergePiece();
      clearLines();
      updateHud();
      spawnPiece();
    }

    function updateHud() {
      scoreEl.textContent = score;
      linesEl.textContent = lines;
      levelEl.textContent = level;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem('tetris-best', String(best));
      }
    }

    function drawCell(context, x, y, color, size) {
      const px = x * size;
      const py = y * size;
      context.fillStyle = color;
      context.fillRect(px, py, size, size);
      context.strokeStyle = 'rgba(255,255,255,0.14)';
      context.lineWidth = 1;
      context.strokeRect(px + 0.5, py + 0.5, size - 1, size - 1);
      context.fillStyle = 'rgba(255,255,255,0.14)';
      context.fillRect(px + 2, py + 2, size - 4, Math.max(2, size * 0.18));
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(255,255,255,0.02)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      if (shakeFrames > 0) {
        const amplitude = Math.min(7, shakeFrames * 0.4);
        ctx.translate((Math.random() - 0.5) * amplitude, (Math.random() - 0.5) * amplitude);
      }

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const value = board[y][x];
          if (value) drawCell(ctx, x, y, COLORS[value], CELL);
          else {
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.strokeRect(x * CELL + 0.5, y * CELL + 0.5, CELL - 1, CELL - 1);
          }
        }
      }

      particles.forEach(particle => {
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, particle.life / 35));
        ctx.fillStyle = particle.color;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      if (flashStrength > 0) {
        ctx.fillStyle = `rgba(103, 215, 255, ${flashStrength * 0.12})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      ctx.restore();

      if (current) {
        current.matrix.forEach((row, rowIndex) => {
          row.forEach((value, colIndex) => {
            if (value && current.y + rowIndex >= 0) {
              drawCell(ctx, current.x + colIndex, current.y + rowIndex, COLORS[current.color], CELL);
            }
          });
        });
      }

      if (gameOver) {
        ctx.fillStyle = 'rgba(4, 8, 16, 0.68)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#eef4ff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '700 28px "Trebuchet MS", sans-serif';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 14);
        ctx.font = '500 16px "Trebuchet MS", sans-serif';
        ctx.fillStyle = '#a8bbdf';
        ctx.fillText('Carrega em Reiniciar', canvas.width / 2, canvas.height / 2 + 22);
      } else if (isPaused) {
        ctx.fillStyle = 'rgba(4, 8, 16, 0.56)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#9bffcb';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = '700 28px "Trebuchet MS", sans-serif';
        ctx.fillText('PAUSA', canvas.width / 2, canvas.height / 2);
      }
    }

    function drawNext() {
      const size = 30;
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
      nextCtx.fillStyle = 'rgba(255,255,255,0.02)';
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

      const matrix = nextPiece.matrix;
      const width = matrix[0].length;
      const height = matrix.length;
      const offsetX = Math.floor((nextCanvas.width / size - width) / 2);
      const offsetY = Math.floor((nextCanvas.height / size - height) / 2);

      matrix.forEach((row, rowIndex) => {
        row.forEach((value, colIndex) => {
          if (value) drawCell(nextCtx, offsetX + colIndex, offsetY + rowIndex, COLORS[nextPiece.color], size);
        });
      });
    }

    function draw() {
      drawBoard();
    }

    function update(time = 0) {
      if (!isRunning) {
        draw();
        return;
      }

      const delta = time - lastTime;
      lastTime = time;

      if (!isPaused && !gameOver) {
        dropCounter += delta;
        if (dropCounter > dropInterval) {
          softDrop();
        }
        updateParticles();
      }

      draw();
      requestAnimationFrame(update);
    }

    function togglePause() {
      if (gameOver || !isRunning) return;
      isPaused = !isPaused;
      messageEl.textContent = isPaused ? 'Jogo em pausa' : 'Boa sorte';
      pauseBtn.textContent = isPaused ? 'Continuar' : 'Pausa';
      pauseTouchBtn.textContent = isPaused ? 'Continuar' : 'Pausa';
      draw();
    }

    function startGame() {
      resetGame();
      pauseBtn.textContent = 'Pausa';
      pauseTouchBtn.textContent = 'Pausa';
      messageEl.textContent = 'Boa sorte';
      if (!animationStarted) {
        animationStarted = true;
        requestAnimationFrame(update);
      }
    }

    let animationStarted = false;

    document.getElementById('startBtn').addEventListener('click', startGame);
    const pauseBtn = document.getElementById('pauseBtn');
    const pauseTouchBtn = document.getElementById('pauseTouchBtn');

    pauseBtn.addEventListener('click', togglePause);
    pauseTouchBtn.addEventListener('click', togglePause);
    document.getElementById('leftBtn').addEventListener('click', () => move(-1));
    document.getElementById('rightBtn').addEventListener('click', () => move(1));
    document.getElementById('rotateBtn').addEventListener('click', rotateCurrent);
    document.getElementById('downBtn').addEventListener('click', softDrop);
    document.getElementById('dropBtn').addEventListener('click', hardDrop);

    document.addEventListener('keydown', event => {
      if (event.key === 'ArrowLeft') move(-1);
      else if (event.key === 'ArrowRight') move(1);
      else if (event.key === 'ArrowDown') softDrop();
      else if (event.key === 'ArrowUp') rotateCurrent();
      else if (event.key === ' ') {
        event.preventDefault();
        hardDrop();
      } else if (event.key.toLowerCase() === 'p') {
        togglePause();
      } else if (event.key.toLowerCase() === 'r') {
        startGame();
      }
    });

    startGame();
  </script>
</body>
</html>
